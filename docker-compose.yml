# =============================================================================
# KOCH AI — Air-Gapped Engineering Intelligence Platform
# Docker Compose Orchestration
# =============================================================================
# All services run on an isolated internal network. No external egress required.
# GPU passthrough is mandatory for the vLLM inference engine.
#
# Usage:
#   cp .env.example .env       # Configure secrets & model path
#   ./deploy.sh                # Build and launch the full stack
# =============================================================================


# ---------------------------------------------------------------------------
# Shared internal network — all inter-service traffic stays on-premise
# ---------------------------------------------------------------------------
networks:
  koch-internal:
    driver: bridge
    name: koch-internal

# ---------------------------------------------------------------------------
# Persistent volumes
# ---------------------------------------------------------------------------
volumes:
  hindsight-data:
    driver: local
  model-cache:
    driver: local
  shared-uploads:
    driver: local
  redis-data:
    driver: local

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:
  # =========================================================================
  # 0. Nginx Reverse Proxy — Only Exposed Service
  # =========================================================================
  nginx-proxy:
    image: nginx:alpine
    container_name: koch-reverse-proxy
    restart: unless-stopped
    networks:
      - koch-internal
    ports:
      - "8080:80"
      # - "443:443"  # Uncomment when SSL certs are ready
    volumes:
      - ./reverse-proxy.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend-api:
        condition: service_healthy
      frontend:
        condition: service_started

  # =========================================================================
  # 1. LLM Proxy — Bypass Cloudflare WAF block on OpenAI SDK default User-Agent
  # =========================================================================
  llm-proxy:
    image: nginx:alpine
    container_name: llm-proxy
    restart: unless-stopped
    networks:
      - koch-internal
    volumes:
      - ./llm-proxy.conf:/etc/nginx/nginx.conf:ro


  # =========================================================================
  # 2. Hindsight — Temporal Memory Graph (Vector + Entity Storage)
  # =========================================================================
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: koch-hindsight
    restart: unless-stopped
    depends_on:
      - llm-proxy
    networks:
      - koch-internal
    ports:
      - "${HINDSIGHT_PORT:-8888}:8888"
      - "9999:9999"
    environment:
      - HINDSIGHT_API_KEY=${HINDSIGHT_API_KEY:-koch-hindsight-key}
      - HINDSIGHT_STORAGE_DIR=/data
      - HINDSIGHT_API_LLM_API_KEY=${VLLM_API_KEY}
      - HINDSIGHT_API_LLM_BASE_URL=http://llm-proxy/v1
      - HINDSIGHT_API_LLM_PROVIDER=openai
      - HINDSIGHT_API_LLM_MODEL=${LLM_MODEL}
      - HINDSIGHT_LLM_MODEL=${LLM_MODEL}
      - LLM_MODEL=${LLM_MODEL}
    env_file:
      - .env
    volumes:
      - hindsight-data:/data   # Persist memory graph across restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # =========================================================================
  # 3. Backend API — FastAPI Orchestrator
  # =========================================================================
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: koch-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - koch-internal
    env_file:
      - .env
    environment:
      # Service discovery — containers resolve each other by service name
      - HINDSIGHT_BASE_URL=http://hindsight:8888
      - VLLM_BASE_URL=http://llm-proxy/v1
      - WORKER_BASE_URL=http://parser-workers:9000
    depends_on:
      llm-proxy:
        condition: service_started
      hindsight:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app                 # Hot-reload in development
      - /app/__pycache__               # Exclude bytecode cache
      - shared-uploads:/app/uploads    # Shared volume for temporary celery uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # =========================================================================
  # 4. Frontend — Next.js (App Router + Tailwind + TypeScript)
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: koch-frontend
    restart: unless-stopped
    networks:
      - koch-internal
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # The frontend accesses the API via the relative /api/ route handled by Nginx proxy
      - NEXT_PUBLIC_API_URL=/
    depends_on:
      backend-api:
        condition: service_healthy

  # =========================================================================
  # 8. Redis Broker — Message Queue for Celery
  # =========================================================================
  redis:
    image: redis:alpine
    container_name: koch-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - koch-internal
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # 9. Image Processor Worker — Celery Pipeline for Photo Ingestion
  # =========================================================================
  image-processor:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: koch-image-processor
    restart: unless-stopped
    command: ["celery", "-A", "image_processor.celery_app", "worker", "--loglevel=info"]
    networks:
      - koch-internal
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HINDSIGHT_BASE_URL=http://hindsight:8888
      - VLLM_BASE_URL=http://llm-proxy/v1
    depends_on:
      llm-proxy:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./workers:/app
      - /app/__pycache__
      - shared-uploads:/app/uploads
      
  # =========================================================================
  # 5. Parser Workers — Document Ingestion Pipeline (Docling + VLM)
  # =========================================================================
  parser-workers:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: koch-workers
    restart: unless-stopped
    networks:
      - koch-internal
    env_file:
      - .env
    environment:
      - HINDSIGHT_BASE_URL=http://hindsight:8888
      - VLLM_BASE_URL=http://llm-proxy/v1
    depends_on:
      llm-proxy:
        condition: service_started
      hindsight:
        condition: service_healthy
    volumes:
      - ./workers:/app
      - /app/__pycache__

  # =========================================================================
  # 6. CAD Parser Workers — Autodesk Inventor Ingestion Pipeline
  # =========================================================================
  cad-workers:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: koch-cad-workers
    restart: unless-stopped
    command: ["uvicorn", "cad_processor:app", "--host", "0.0.0.0", "--port", "9001", "--reload"]
    networks:
      - koch-internal
    env_file:
      - .env
    environment:
      - HINDSIGHT_BASE_URL=http://hindsight:8888
      - VLLM_BASE_URL=http://llm-proxy/v1
    depends_on:
      llm-proxy:
        condition: service_started
      hindsight:
        condition: service_healthy
    volumes:
      - ./workers:/app
      - /app/__pycache__

  # =========================================================================
  # 7. Telegram Bot — Mobile Field Assistant
  # =========================================================================
  telegram-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: koch-telegram-bot
    restart: unless-stopped
    networks:
      - koch-internal
    env_file:
      - .env
    environment:
      - BACKEND_API_URL=http://backend-api:8000
    depends_on:
      backend-api:
        condition: service_healthy
